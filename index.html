<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <link rel="stylesheet" href="egenbot.css">
</head>
<body>

  <header>
    <div class="logo">Chatbot<span>.</span></div>
    <button id="themeToggle" class="theme-btn">☀️</button>
  </header>

  <div id="chat"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <button id="myPositionBtn" class="position-btn" title="Min posisjon">📍</button>
      <input id="userInput" type="text" placeholder="Skriv noe...">
      <button id="sendBtn">↑</button>
    </div>
  </div>

  <script src="egenbot.js"></script>

</body>
</html>
